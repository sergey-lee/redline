name: Redline
options:
  bundleIdPrefix: net.alienminds
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 4GZ4AH8Z6M
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Redline:
    type: application
    platform: macOS
    sources:
      - Sources/Redline
      - Sources/Shared
      - path: Resources/Redline.icns
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleIconFile: Redline
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Local-only usage tracker. No data leaves your machine."
    entitlements:
      path: Resources/Redline.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.alienminds.redline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.alienminds.redline
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - target: RedlineWidget

  RedlineWidget:
    type: app-extension
    platform: macOS
    sources:
      - Sources/RedlineWidget
      - Sources/Shared
    info:
      path: Resources/RedlineWidget-Info.plist
      properties:
        CFBundleDisplayName: Redline
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Resources/RedlineWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.net.alienminds.redline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.alienminds.redline.widget
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
